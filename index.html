<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;">
  <title>HDR Video Analyzer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      overflow: hidden;
      user-select: none;
    }
    .screen { position: absolute; inset: 0; display: none; flex-direction: column; }
    .screen.active { display: flex; }

    /* --- Drop screen --- */
    #screen-drop { align-items: center; justify-content: center; padding: 32px; }
    .dropzone {
      width: min(640px, 90%); min-height: 320px;
      border: 2px dashed #2e4a7a; border-radius: 16px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 18px; padding: 48px 32px; text-align: center;
      background: #16213e; cursor: pointer;
      transition: border-color .15s, background .15s, transform .15s;
    }
    .dropzone:hover { border-color: #e94560; background: #1b2748; }
    .dropzone.dragover { border-color: #e94560; background: #20305c; transform: scale(1.01); }
    .dropzone .icon { font-size: 56px; line-height: 1; }
    .dropzone h2 { font-size: 20px; font-weight: 600; color: #fff; }
    .dropzone p { font-size: 14px; color: #9fb0d0; }
    .dropzone .hint { font-size: 12px; color: #6b7aa0; margin-top: 4px; }
    .err { margin-top: 18px; color: #ff7b8a; font-size: 13px; min-height: 18px; text-align: center; }

    /* --- GPU toggle --- */
    .gpu-toggle {
      display: flex; align-items: center; gap: 10px;
      margin-top: 22px; cursor: pointer; flex-wrap: wrap; justify-content: center;
    }
    .gpu-toggle input { position: absolute; opacity: 0; width: 0; height: 0; }
    .gpu-toggle .track {
      position: relative; width: 42px; height: 22px; border-radius: 11px;
      background: #2e3a5a; transition: background .15s; flex-shrink: 0;
    }
    .gpu-toggle .thumb {
      position: absolute; top: 2px; left: 2px; width: 18px; height: 18px;
      border-radius: 50%; background: #cdd8ef; transition: transform .15s;
    }
    .gpu-toggle input:checked + .track { background: #e94560; }
    .gpu-toggle input:checked + .track .thumb { transform: translateX(20px); background: #fff; }
    .gpu-toggle .gpu-label { font-size: 14px; color: #cdd8ef; }
    .gpu-toggle .gpu-hint { font-size: 12px; color: #6b7aa0; width: 100%; text-align: center; }

    /* --- Progress screen --- */
    #screen-progress { align-items: center; justify-content: center; padding: 32px; gap: 26px; }
    #screen-progress .fname { font-size: 15px; color: #cdd8ef; max-width: 80%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .bar-wrap { width: min(560px, 86%); }
    .bar-track { height: 14px; background: #0f1830; border-radius: 8px; overflow: hidden; border: 1px solid #243358; }
    .bar-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #e94560, #ff8c5a); transition: width .2s; }
    .bar-meta { display: flex; justify-content: space-between; margin-top: 10px; font-size: 12px; color: #9fb0d0; }
    .pct { font-size: 32px; font-weight: 700; color: #fff; font-variant-numeric: tabular-nums; }

    /* --- Result screen --- */
    #screen-result { }
    .toolbar {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 18px; background: #16213e; border-bottom: 1px solid #0f3460;
      flex-shrink: 0;
    }
    .toolbar .title { font-size: 14px; font-weight: 600; color: #e94560; margin: 0 auto 0 8px; max-width: 50%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .content { flex: 1; display: flex; align-items: flex-start; justify-content: center; padding: 20px; overflow: auto; }
    .chart-canvas { max-width: 100%; height: auto; background: #fff; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,.4); }

    button {
      padding: 8px 16px; border-radius: 8px; cursor: pointer;
      font-size: 13px; font-weight: 600;
      background: #0f3460; color: #e0e0e0; border: 1px solid #1a4a7a;
      transition: background .15s, border-color .15s;
    }
    button:hover { background: #1a4a7a; }
    button.accent { background: #e94560; border-color: #ff6275; color: #fff; }
    button.accent:hover { background: #ff5670; }
    .saved-msg { font-size: 12px; color: #7fe0a0; min-width: 0; }
  </style>
</head>
<body>
  <!-- State 1: choose / drop -->
  <section id="screen-drop" class="screen active">
    <div id="dropzone" class="dropzone">
      <div class="icon">🎬</div>
      <h2>拖入 HDR 视频文件</h2>
      <p>或点击此处选择文件</p>
      <div class="hint">支持 MKV · MP4 · MOV · TS</div>
    </div>
    <label class="gpu-toggle" id="gpu-toggle">
      <input type="checkbox" id="gpu-checkbox" checked>
      <span class="track"><span class="thumb"></span></span>
      <span class="gpu-label">GPU 加速解码</span>
      <span class="gpu-hint">优先用显卡解码，失败自动转 CPU</span>
    </label>
    <div id="drop-err" class="err"></div>
  </section>

  <!-- State 2: analyzing -->
  <section id="screen-progress" class="screen">
    <div class="fname" id="prog-fname"></div>
    <div class="pct" id="prog-pct">0.0%</div>
    <div class="bar-wrap">
      <div class="bar-track"><div class="bar-fill" id="prog-bar"></div></div>
      <div class="bar-meta">
        <span id="prog-time">时间: 0.0s</span>
        <span id="prog-peak">Peak: 0 nits</span>
      </div>
    </div>
    <button id="btn-cancel" class="accent">取消分析</button>
  </section>

  <!-- State 3: result -->
  <section id="screen-result" class="screen">
    <div class="toolbar">
      <button id="btn-back">← 返回</button>
      <span class="title" id="result-title"></span>
      <span class="saved-msg" id="saved-msg"></span>
      <button id="btn-save-png">保存 PNG</button>
      <button id="btn-save-html" class="accent">保存 HTML</button>
    </div>
    <div class="content">
      <canvas id="chart-canvas" class="chart-canvas"></canvas>
    </div>
  </section>

  <script src="assets/chart-renderer.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
